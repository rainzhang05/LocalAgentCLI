name: Perf

on:
  workflow_dispatch:

jobs:
  perf:
    name: Opt-in performance tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Perf tests
        run: RUN_PERF=1 python -m pytest tests/perf/ -v -m perf
