name: Publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Publish target
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  smoke:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Smoke test pipx install
        run: |
          python -m pipx install --force dist/*.whl
          PIPX_BIN_DIR="$(python -m pipx environment --value PIPX_BIN_DIR)"
          printf "/exit\n" | "$PIPX_BIN_DIR/localagentcli"
          python -m pipx uninstall localagentcli

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
    needs: [build, smoke]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: testpypi

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
    needs: [build, smoke]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
